<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IKEA Admin | Scavenger Hunt Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <style>
    :root {
      --ikea-blue: #0051ba;
      --ikea-yellow: #ffdb00;
      --success: #28a745;
      --warning: #ffc107;
      --danger: #dc3545;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: white;
    }

    /* Login Screen */
    .login-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .login-box h1 { color: var(--ikea-yellow); margin-bottom: 10px; }
    .login-box p { color: #aaa; margin-bottom: 30px; }
    .login-box input {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 15px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .login-box button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      background: var(--ikea-blue);
      color: white;
      cursor: pointer;
      transition: all 0.3s;
    }

    /* Dashboard */
    .dashboard { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
    .dashboard.visible { display: block; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header h1 { color: var(--ikea-yellow); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.1);
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .stat-card .number { font-size: 3em; font-weight: bold; color: var(--ikea-yellow); }
    .stat-card .label { color: #aaa; margin-top: 5px; }

    .section {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 30px;
    }

    .section h2 { margin-bottom: 20px; color: var(--ikea-yellow); border-bottom: 2px solid var(--ikea-blue); padding-bottom: 10px; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    th { color: var(--ikea-yellow); font-size: 0.9em; text-transform: uppercase; }
    
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
    .status-started { background: var(--warning); color: #000; }
    .status-completed { background: var(--success); color: #fff; }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-refresh { background: var(--ikea-blue); color: white; }
    .btn-logout { background: var(--danger); color: white; }
  </style>
</head>

<body>
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <h1>🔐 Admin Login</h1>
      <p>IKEA Hunt Analytics</p>
      <input type="password" id="admin-pass" placeholder="Password (default: ikea2024)">
      <button onclick="login()">Login</button>
      <p id="error" style="color:red; margin-top:10px; display:none;">Invalid Password</p>
    </div>
  </div>

  <div id="dashboard" class="dashboard">
    <div class="header">
      <h1>📊 IKEA Hunt Dashboard</h1>
      <div>
        <button class="btn btn-refresh" onclick="loadData()">Refresh</button>
        <button class="btn btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div id="stat-total" class="number">0</div>
        <div class="label">Total Players</div>
      </div>
      <div class="stat-card">
        <div id="stat-completed" class="number" style="color:var(--success)">0</div>
        <div class="label">Completions</div>
      </div>
    </div>

    <div class="section">
      <h2>👥 Player Activity</h2>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Phone</th>
              <th>Status</th>
              <th>Started</th>
              <th>Completed</th>
            </tr>
          </thead>
          <tbody id="player-table">
            <tr><td colspan="5" style="text-align:center">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let supabaseClient;

    async function login() {
      const pass = document.getElementById('admin-pass').value;
      if (pass === 'ikea2024' || pass === 'admin') {
        sessionStorage.setItem('admin_auth', 'true');
        showDashboard();
      } else {
        document.getElementById('error').style.display = 'block';
      }
    }

    function logout() {
      sessionStorage.removeItem('admin_auth');
      location.reload();
    }

    function showDashboard() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').classList.add('visible');
      initSupabase();
      loadData();
    }

    function initSupabase() {
      supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
    }

    async function loadData() {
      const { data, error } = await supabaseClient
        .from('game_sessions')
        .select('*')
        .order('started_at', { ascending: false });

      if (error) {
        console.error(error);
        return;
      }

      // Stats
      document.getElementById('stat-total').innerText = data.length;
      document.getElementById('stat-completed').innerText = data.filter(p => p.status === 'completed').length;

      // Table
      const tbody = document.getElementById('player-table');
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">No players yet</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(p => `
        <tr>
          <td style="font-weight:bold">${p.player_name || 'Anonymous'}</td>
          <td style="color:#aaa">${p.player_phone || '-'}</td>
          <td><span class="status-badge status-${p.status || 'started'}">${p.status || 'started'}</span></td>
          <td>${p.started_at ? new Date(p.started_at).toLocaleString() : '-'}</td>
          <td>${p.completed_at ? new Date(p.completed_at).toLocaleString() : '-'}</td>
        </tr>
      `).join('');
    }

    window.onload = () => {
      if (sessionStorage.getItem('admin_auth') === 'true') {
        showDashboard();
      }
    };
  </script>
</body>

</html>
